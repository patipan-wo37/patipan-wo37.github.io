<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบตรวจสอบข้อมูลบัตรอนุญาต</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        body {
            box-sizing: border-box;
        }
        .gradient-bg {
            background: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%);
        }
        .card-shadow {
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }
        .scanner-container {
            border-radius: 12px;
            overflow: hidden;
        }
        .activity-item {
            border-left: 4px solid #3b82f6;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Header -->
    <div class="gradient-bg text-white py-6 shadow-lg">
        <div class="container mx-auto px-4">
            <h1 class="text-3xl font-bold text-center">ระบบตรวจสอบข้อมูลบัตรอนุญาต</h1>
            <p class="text-center text-blue-100 mt-2">License Verification System</p>
        </div>
    </div>

    <div class="container mx-auto px-4 py-8">
        <!-- Search Section -->
        <div class="bg-white rounded-xl shadow-lg p-6 mb-8">
            <h2 class="text-2xl font-semibold text-gray-800 mb-6 flex items-center">
                <svg class="w-6 h-6 mr-2 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
                ค้นหาข้อมูลพนักงาน
            </h2>
            
            <div class="space-y-6">
                <!-- Barcode Input -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">สแกน Barcode</label>
                    <div class="flex gap-2">
                        <input type="text" id="barcodeInput" placeholder="กรอกหรือสแกน Barcode" 
                               class="flex-1 px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent">
                        <button onclick="toggleScanner()" id="scannerBtn"
                                class="px-6 py-3 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors font-medium flex items-center">
                            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0118.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path>
                            </svg>
                            เปิดกล้อง
                        </button>
                    </div>
                </div>

                <!-- Manual Search -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">รหัสพนักงาน หรือ ชื่อ-นามสกุล</label>
                    <div class="flex gap-2">
                        <input type="text" id="searchInput" placeholder="กรอกรหัสพนักงาน หรือ ชื่อ-นามสกุล" 
                               class="flex-1 px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                        <button onclick="searchEmployee()" 
                                class="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-medium">
                            ค้นหา
                        </button>
                    </div>
                </div>
            </div>

            <!-- Scanner Container -->
            <div id="scannerContainer" class="hidden mt-6">
                <div class="scanner-container bg-gray-100 p-4">
                    <div id="reader" class="w-full"></div>
                </div>
                <button onclick="stopScanner()" 
                        class="mt-4 px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition-colors">
                    หยุดสแกน
                </button>
            </div>


        </div>

        <!-- Employee Card -->
        <div id="employeeCard" class="hidden bg-white rounded-xl shadow-lg overflow-hidden mb-8">
            <div class="bg-gradient-to-r from-blue-600 to-blue-700 text-white p-4">
                <h3 class="text-xl font-semibold">ข้อมูลพนักงาน</h3>
            </div>
            
            <div class="p-6">
                <div class="grid md:grid-cols-4 gap-6">
                    <!-- Column 1: Photo -->
                    <div class="md:col-span-1">
                        <div class="aspect-square bg-gray-200 rounded-lg overflow-hidden cursor-pointer hover:shadow-lg transition-shadow" onclick="showPhotoModal()">
                            <img id="employeePhoto" src="" alt="รูปพนักงาน" class="w-full h-full object-cover hover:scale-105 transition-transform">
                        </div>
                        <p class="text-xs text-gray-500 text-center mt-2">คลิกเพื่อดูรูปขนาดใหญ่</p>
                    </div>

                    <!-- Column 2: Basic Info -->
                    <div class="md:col-span-1 space-y-4">
                        <div class="bg-blue-50 p-4 rounded-lg border border-blue-200">
                            <label class="text-sm font-semibold text-blue-700">ชื่อ-นามสกุล</label>
                            <p id="employeeName" class="text-lg font-bold text-gray-900 mt-1">-</p>
                        </div>
                        <div class="bg-green-50 p-4 rounded-lg border border-green-200">
                            <label class="text-sm font-semibold text-green-700">รหัสพนักงาน</label>
                            <p id="employeeId" class="text-lg font-semibold text-gray-900 mt-1">-</p>
                        </div>
                        <div class="bg-purple-50 p-4 rounded-lg border border-purple-200">
                            <label class="text-sm font-semibold text-purple-700">สถานะบัตร</label>
                            <div class="mt-2">
                                <span id="cardStatus" class="inline-block px-4 py-2 rounded-full text-sm font-bold">-</span>
                            </div>
                        </div>
                        <div class="bg-yellow-50 p-4 rounded-lg border border-yellow-200">
                            <label class="text-sm font-semibold text-yellow-700">ข้อมูลบัตรเพิ่มเติม</label>
                            <p id="additionalInfo" class="text-gray-900 font-medium mt-1">-</p>
                        </div>
                    </div>

                    <!-- Column 3: Work Info -->
                    <div class="md:col-span-1 space-y-4">
                        <div class="bg-orange-50 p-4 rounded-lg border border-orange-200">
                            <label class="text-sm font-semibold text-orange-700">หน่วยงาน</label>
                            <p id="department" class="text-lg font-semibold text-gray-900 mt-1">-</p>
                        </div>
                        <div class="bg-pink-50 p-4 rounded-lg border border-pink-200">
                            <label class="text-sm font-semibold text-pink-700">แผนก</label>
                            <p id="division" class="text-lg font-semibold text-gray-900 mt-1">-</p>
                        </div>
                        <div class="bg-teal-50 p-4 rounded-lg border border-teal-200">
                            <label class="text-sm font-semibold text-teal-700">ตำแหน่ง</label>
                            <p id="position" class="text-lg font-semibold text-gray-900 mt-1">-</p>
                        </div>
                        <div class="bg-gray-50 p-4 rounded-lg border border-gray-200">
                            <label class="text-sm font-semibold text-gray-700">หน่วยงานที่ออกบัตร</label>
                            <p id="issuingAgency" class="text-lg font-semibold text-gray-900 mt-1">-</p>
                        </div>
                    </div>

                    <!-- Column 4: Card Info -->
                    <div class="md:col-span-1 space-y-4">
                        <div class="bg-gray-50 p-4 rounded-lg border border-gray-200 text-center">
                            <label class="text-sm font-semibold text-gray-700 block">หมายเลขพื้นที่</label>
                            <div class="bg-blue-600 px-8 py-6 rounded-lg border-2 border-blue-700 mt-2 inline-block">
                                <p id="areaNumber" class="text-9xl font-black text-white">-</p>
                            </div>
                        </div>
                        <div class="bg-red-50 p-4 rounded-lg border border-red-200">
                            <label class="text-sm font-semibold text-red-700">วันที่บัตรหมดอายุ</label>
                            <p id="expiryDate" class="text-lg font-semibold text-gray-900 mt-1">-</p>
                        </div>
                        <div class="bg-indigo-50 p-4 rounded-lg border border-indigo-200">
                            <label class="text-sm font-semibold text-indigo-700">ประเภทบัตร</label>
                            <p id="cardType" class="text-lg font-semibold text-gray-900 mt-1">-</p>
                        </div>
                    </div>
                </div>

                <!-- Additional Information Section -->
                <div class="mt-6 pt-6 border-t border-gray-200">
                    <h4 class="text-lg font-semibold text-gray-800 mb-4">ข้อมูลเพิ่มเติม</h4>
                    <div class="grid md:grid-cols-1 gap-6">
                        <div class="bg-cyan-50 p-4 rounded-lg border border-cyan-200">
                            <label class="text-sm font-semibold text-cyan-700">หมายเหตุ</label>
                            <p id="notes" class="text-gray-900 font-medium mt-1">-</p>
                        </div>
                    </div>
                    
                    <!-- Document Links -->
                    <div class="mt-4 flex gap-4">
                        <button id="viewPdfBtn" onclick="viewPdf()" class="hidden px-6 py-3 bg-red-600 text-white rounded-lg hover:bg-red-700 transition-colors text-sm font-medium">
                            <svg class="w-4 h-4 inline mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                            </svg>
                            ตรวจสอบใบคำขอทำบัตรอนุญาต
                        </button>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="flex gap-4 mt-8 pt-6 border-t border-gray-200">
                    <button onclick="recordTimeIn()" 
                            class="flex-1 px-8 py-5 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors font-bold text-lg">
                        ยืนยันเวลาเข้า
                    </button>
                    <button onclick="recordTimeOut()" 
                            class="flex-1 px-8 py-5 bg-orange-600 text-white rounded-lg hover:bg-orange-700 transition-colors font-bold text-lg">
                        ยืนยันเวลาออก
                    </button>
                    <button onclick="cancelAction()" 
                            class="flex-1 px-8 py-5 bg-gray-600 text-white rounded-lg hover:bg-gray-700 transition-colors font-bold text-lg">
                        ยกเลิก
                    </button>
                </div>
            </div>
        </div>

        <!-- Recent Activities -->
        <div class="bg-white rounded-xl shadow-lg p-6">
            <!-- Current Date and Time -->
            <div class="bg-gradient-to-r from-blue-50 to-indigo-50 p-4 rounded-lg mb-6 border border-blue-200">
                <div class="flex items-center justify-between">
                    <div class="flex items-center">
                        <svg class="w-6 h-6 mr-3 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                        </svg>
                        <div>
                            <p class="text-lg font-semibold text-gray-800" id="currentDate">-</p>
                            <p class="text-sm text-gray-600">วันที่ปัจจุบัน</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="text-2xl font-bold text-blue-600" id="currentTime">-</p>
                        <p class="text-sm text-gray-600">เวลาปัจจุบัน</p>
                    </div>
                </div>
            </div>
            
            <h3 class="text-xl font-semibold text-gray-800 mb-4 flex items-center">
                <svg class="w-5 h-5 mr-2 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                กิจกรรมล่าสุด
            </h3>
            <div id="recentActivities" class="space-y-3">
                <p class="text-gray-500 text-center py-8">ยังไม่มีกิจกรรม</p>
            </div>
        </div>
    </div>

    <!-- Photo Modal -->
    <div id="photoModal" class="hidden fixed inset-0 bg-black bg-opacity-75 z-50 flex items-center justify-center p-4">
        <div class="relative max-w-4xl max-h-full">
            <button onclick="closePhotoModal()" class="absolute -top-12 right-0 text-white hover:text-gray-300 text-xl font-bold z-10">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
            <img id="modalPhoto" src="" alt="รูปพนักงาน" class="max-w-full max-h-full object-contain rounded-lg shadow-2xl">
            <div class="absolute bottom-0 left-0 right-0 bg-black bg-opacity-50 text-white p-4 rounded-b-lg">
                <p id="modalPhotoCaption" class="text-center font-medium">-</p>
            </div>
        </div>
    </div>

    <script>
        let html5QrcodeScanner = null;
        let currentEmployeeData = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            loadRecentActivities();
            updateDateTime();
            // Update time every second
            setInterval(updateDateTime, 1000);
        });

        // Update current date and time
        function updateDateTime() {
            const now = new Date();
            
            // Format date in Thai
            const dateOptions = { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric',
                weekday: 'long'
            };
            const formattedDate = now.toLocaleDateString('th-TH', dateOptions);
            
            // Format time
            const timeOptions = {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            };
            const formattedTime = now.toLocaleTimeString('th-TH', timeOptions);
            
            document.getElementById('currentDate').textContent = formattedDate;
            document.getElementById('currentTime').textContent = formattedTime;
        }

        // Search employee
        async function searchEmployee() {
            const searchTerm = document.getElementById('searchInput').value.trim();
            if (!searchTerm) {
                Swal.fire('กรุณากรอกข้อมูล', 'กรุณากรอกรหัสพนักงาน หรือ ชื่อ-นามสกุล', 'warning');
                return;
            }

            Swal.fire({
                title: 'กำลังค้นหา...',
                allowOutsideClick: false,
                didOpen: () => {
                    Swal.showLoading();
                }
            });

            try {
                const response = await fetch(`https://script.google.com/macros/s/AKfycbzJzknzSvGQnaIj_RRsZDztY-aHIJ8M63YdW2ZhZOKkBH3bfPG4T4CKNRByTnvWR2fA/exec?action=search&query=${encodeURIComponent(searchTerm)}`);
                const data = await response.json();
                
                Swal.close();
                
                if (data.success && data.employee) {
                    displayEmployeeData(data.employee);
                } else {
                    Swal.fire('ไม่พบข้อมูล', 'ไม่พบข้อมูลพนักงานที่ค้นหา', 'info');
                }
            } catch (error) {
                Swal.close();
                Swal.fire('เกิดข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อกับระบบได้', 'error');
            }
        }

        // Toggle barcode scanner
        function toggleScanner() {
            const container = document.getElementById('scannerContainer');
            const btn = document.getElementById('scannerBtn');
            
            if (container.classList.contains('hidden')) {
                container.classList.remove('hidden');
                btn.textContent = 'กำลังสแกน...';
                btn.disabled = true;
                startScanner();
            }
        }

        // Start barcode scanner
        function startScanner() {
            html5QrcodeScanner = new Html5Qrcode("reader");
            
            html5QrcodeScanner.start(
                { facingMode: "environment" },
                {
                    fps: 10,
                    qrbox: { width: 250, height: 250 }
                },
                (decodedText, decodedResult) => {
                    document.getElementById('barcodeInput').value = decodedText;
                    document.getElementById('searchInput').value = decodedText;
                    stopScanner();
                    // รอ 1 วินาทีแล้วค้นหาอัตโนมัติ
                    setTimeout(() => {
                        searchEmployee();
                    }, 1000);
                },
                (errorMessage) => {
                    // Handle scan error
                }
            ).catch(err => {
                console.error('Scanner error:', err);
                Swal.fire('เกิดข้อผิดพลาด', 'ไม่สามารถเปิดกล้องได้', 'error');
                stopScanner();
            });
        }

        // Stop barcode scanner
        function stopScanner() {
            if (html5QrcodeScanner) {
                html5QrcodeScanner.stop().then(() => {
                    html5QrcodeScanner.clear();
                    html5QrcodeScanner = null;
                }).catch(err => {
                    console.error('Stop scanner error:', err);
                });
            }
            
            document.getElementById('scannerContainer').classList.add('hidden');
            const btn = document.getElementById('scannerBtn');
            btn.innerHTML = `
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0118.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path>
                </svg>
                เปิดกล้อง
            `;
            btn.disabled = false;
        }

        // Handle barcode input with auto search
        function handleBarcodeInput() {
            const barcodeValue = document.getElementById('barcodeInput').value.trim();
            if (barcodeValue) {
                document.getElementById('searchInput').value = barcodeValue;
                // รอ 1 วินาทีแล้วค้นหาอัตโนมัติ
                setTimeout(() => {
                    searchEmployee();
                }, 1000);
            }
        }

        // Display employee data
        function displayEmployeeData(employee) {
            currentEmployeeData = employee;
            
            document.getElementById('employeeName').textContent = employee.name || '-';
            document.getElementById('employeeId').textContent = employee.id || '-';

            document.getElementById('department').textContent = employee.department || '-';
            document.getElementById('division').textContent = employee.division || '-';
            document.getElementById('position').textContent = employee.position || '-';

            document.getElementById('areaNumber').textContent = employee.areaNumber || '-';
            // Format expiry date to DD/MM/YYYY
            let formattedExpiryDate = '-';
            if (employee.expiryDate && employee.expiryDate.trim() !== '') {
                try {
                    const date = new Date(employee.expiryDate);
                    if (!isNaN(date.getTime())) {
                        const day = String(date.getDate()).padStart(2, '0');
                        const month = String(date.getMonth() + 1).padStart(2, '0');
                        const year = date.getFullYear();
                        formattedExpiryDate = `${day}/${month}/${year}`;
                    } else {
                        formattedExpiryDate = employee.expiryDate;
                    }
                } catch (error) {
                    formattedExpiryDate = employee.expiryDate;
                }
            }
            document.getElementById('expiryDate').textContent = formattedExpiryDate;
            document.getElementById('cardType').textContent = employee.cardType || '-';
            document.getElementById('issuingAgency').textContent = employee.issuingAgency || '-';
            document.getElementById('additionalInfo').textContent = employee.additionalInfo || '-';
            document.getElementById('notes').textContent = employee.notes || '-';
            
            // Set photo
            const photo = document.getElementById('employeePhoto');
            if (employee.photo) {
                photo.src = employee.photo;
                photo.alt = `รูป ${employee.name}`;
            } else {
                photo.src = 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAwIiBoZWlnaHQ9IjIwMCIgdmlld0JveD0iMCAwIDIwMCAyMDAiIGZpbGw9Im5vbmUiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+CjxyZWN0IHdpZHRoPSIyMDAiIGhlaWdodD0iMjAwIiBmaWxsPSIjRjNGNEY2Ii8+CjxjaXJjbGUgY3g9IjEwMCIgY3k9IjgwIiByPSIzMCIgZmlsbD0iIzlDQTNBRiIvPgo8cGF0aCBkPSJNNTAgMTYwQzUwIDEzNS4xNDcgNzAuMTQ3IDExNSA5NSAxMTVIMTA1QzEyOS44NTMgMTE1IDE1MCAxMzUuMTQ3IDE1MCAxNjBWMjAwSDUwVjE2MFoiIGZpbGw9IiM5Q0EzQUYiLz4KPC9zdmc+';
                photo.alt = 'ไม่มีรูปภาพ';
            }
            
            // Set card status
            const statusElement = document.getElementById('cardStatus');
            if (employee.expiryDate && employee.expiryDate.trim() !== '') {
                const expiryDate = new Date(employee.expiryDate);
                const today = new Date();
                
                if (!isNaN(expiryDate.getTime())) {
                    if (expiryDate < today) {
                        statusElement.textContent = 'หมดอายุ';
                        statusElement.className = 'inline-block px-4 py-2 rounded-full text-sm font-bold bg-red-100 text-red-800';
                    } else if (expiryDate - today < 30 * 24 * 60 * 60 * 1000) {
                        statusElement.textContent = 'ใกล้หมดอายุ';
                        statusElement.className = 'inline-block px-4 py-2 rounded-full text-sm font-bold bg-yellow-100 text-yellow-800';
                    } else {
                        statusElement.textContent = 'ปกติ';
                        statusElement.className = 'inline-block px-4 py-2 rounded-full text-sm font-bold bg-green-100 text-green-800';
                    }
                } else {
                    statusElement.textContent = 'ไม่ระบุ';
                    statusElement.className = 'inline-block px-4 py-2 rounded-full text-sm font-bold bg-gray-100 text-gray-800';
                }
            } else {
                statusElement.textContent = 'ไม่ระบุ';
                statusElement.className = 'inline-block px-4 py-2 rounded-full text-sm font-bold bg-gray-100 text-gray-800';
            }
            
            // Handle PDF button
            const pdfBtn = document.getElementById('viewPdfBtn');
            if (employee.pdfUrl && employee.pdfUrl.trim() !== '') {
                pdfBtn.classList.remove('hidden');
                pdfBtn.setAttribute('data-pdf-url', employee.pdfUrl);
            } else {
                pdfBtn.classList.add('hidden');
            }

        // Update button states based on employee data
        function updateButtonStates(employee) {
            const timeInBtn = document.querySelector('button[onclick="recordTimeIn()"]');
            const timeOutBtn = document.querySelector('button[onclick="recordTimeOut()"]');
            
            let isDisabled = false;
            let disabledReason = '';
            
            // Check if card is expired
            if (employee.expiryDate && employee.expiryDate.trim() !== '') {
                const expiryDate = new Date(employee.expiryDate);
                const today = new Date();
                
                if (!isNaN(expiryDate.getTime()) && expiryDate < today) {
                    isDisabled = true;
                    disabledReason = 'บัตรหมดอายุ';
                }
            }
            
            // Check card type
            if (employee.cardType) {
                const cardType = employee.cardType.trim();
                if (cardType === 'Stop list' || cardType === 'ยกเลิกบัตร') {
                    isDisabled = true;
                    disabledReason = `ประเภทบัตร: ${cardType}`;
                }
            }
            
            // Update button states
            if (isDisabled) {
                timeInBtn.disabled = true;
                timeOutBtn.disabled = true;
                timeInBtn.classList.remove('bg-green-600', 'hover:bg-green-700');
                timeInBtn.classList.add('bg-gray-400', 'cursor-not-allowed');
                timeOutBtn.classList.remove('bg-orange-600', 'hover:bg-orange-700');
                timeOutBtn.classList.add('bg-gray-400', 'cursor-not-allowed');
                
                // Add tooltip or change text
                timeInBtn.title = `ไม่สามารถใช้งานได้: ${disabledReason}`;
                timeOutBtn.title = `ไม่สามารถใช้งานได้: ${disabledReason}`;
            } else {
                timeInBtn.disabled = false;
                timeOutBtn.disabled = false;
                timeInBtn.classList.remove('bg-gray-400', 'cursor-not-allowed');
                timeInBtn.classList.add('bg-green-600', 'hover:bg-green-700');
                timeOutBtn.classList.remove('bg-gray-400', 'cursor-not-allowed');

                                        <span class="inline-block w-2 h-2 bg-green-400 rounded-full"></span>

                document.getElementById('recentActivities').innerHTML = '<p class="text-gray-500 text-center py-8">ยังไม่มีกิจกรรม</p>';

        // Show photo modal
        function showPhotoModal() {
            const photo = document.getElementById('employeePhoto');
            const modal = document.getElementById('photoModal');
            const modalPhoto = document.getElementById('modalPhoto');
            const modalCaption = document.getElementById('modalPhotoCaption');
            
            if (photo.src && !photo.src.includes('data:image/svg+xml')) {
                modalPhoto.src = photo.src;
                modalPhoto.alt = photo.alt;
                modalCaption.textContent = currentEmployeeData ? 
                    `${currentEmployeeData.name} (${currentEmployeeData.id})` : 
                    'รูปพนักงาน';
                modal.classList.remove('hidden');
                document.body.style.overflow = 'hidden'; // Prevent background scrolling
            }
        }

        // Close photo modal
        function closePhotoModal() {
            const modal = document.getElementById('photoModal');
            modal.classList.add('hidden');
            document.body.style.overflow = 'auto'; // Restore scrolling
        }

        // Close modal when clicking outside the image
        document.getElementById('photoModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closePhotoModal();
            }
        });

        // Close modal with Escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closePhotoModal();
            }
        });

        // Enter key support
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchEmployee();
            }
        });

        // Barcode input support
        document.getElementById('barcodeInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                handleBarcodeInput();
            }
        });

        // Auto search when barcode input changes (for barcode scanners that input text)
        document.getElementById('barcodeInput').addEventListener('input', function(e) {
            const value = e.target.value.trim();
            if (value.length >= 5) { // Trigger when barcode has reasonable length
                clearTimeout(this.searchTimeout);
                this.searchTimeout = setTimeout(() => {
                    handleBarcodeInput();
                }, 500); // Wait 500ms after last input
            }
        });
    </script>
