<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบันทึกข้อมูลบัตร</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body {
            box-sizing: border-box;
        }
        
        .gradient-bg {
            background: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%);
        }
        
        .card-shadow {
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        
        .input-focus:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        .preview-image {
            max-width: 200px;
            max-height: 200px;
            object-fit: cover;
            border-radius: 8px;
        }
        
        .loading {
            display: none;
        }
        
        .loading.show {
            display: inline-block;
        }
        
        .success-message {
            display: none;
        }
        
        .success-message.show {
            display: block;
        }
    </style>
</head>
<body class="min-h-screen bg-gray-50">
    <!-- Header -->
    <div class="gradient-bg text-white py-8">
        <div class="container mx-auto px-4">
            <h1 class="text-3xl font-bold text-center">ระบบบันทึกข้อมูลบัตร</h1>
            <p class="text-center mt-2 text-blue-100">กรอกข้อมูลเพื่อขอทำบัตรอนุญาต</p>
        </div>
    </div>

    <!-- Main Form -->
    <div class="container mx-auto px-4 py-8">
        <div class="max-w-4xl mx-auto">
            <div class="bg-white rounded-xl card-shadow p-8">
                <form id="cardForm" class="space-y-6">
                    <!-- ข้อมูลพื้นฐาน -->
                    <div class="border-b border-gray-200 pb-6">
                        <h2 class="text-xl font-semibold text-gray-800 mb-4 flex items-center">
                            <span class="w-2 h-6 bg-blue-500 rounded mr-3"></span>
                            ข้อมูลพื้นฐาน
                        </h2>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">รหัสพนักงาน *</label>
                                <input type="text" name="employeeId" required 
                                       class="w-full px-4 py-3 border border-gray-300 rounded-lg input-focus transition-all duration-200"
                                       placeholder="กรอกรหัสพนักงาน">
                            </div>
                            
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">ชื่อ-นามสกุล *</label>
                                <input type="text" name="fullName" required 
                                       class="w-full px-4 py-3 border border-gray-300 rounded-lg input-focus transition-all duration-200"
                                       placeholder="กรอกชื่อ-นามสกุล">
                            </div>
                            
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">หน่วยงาน *</label>
                                <input type="text" name="organization" required 
                                       class="w-full px-4 py-3 border border-gray-300 rounded-lg input-focus transition-all duration-200"
                                       placeholder="กรอกหน่วยงาน">
                            </div>
                            
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">แผนก *</label>
                                <select name="department" required 
                                        class="w-full px-4 py-3 border border-gray-300 rounded-lg input-focus transition-all duration-200">
                                    <option value="">เลือกแผนก</option>
                                    <option value="รักษาความปลอดภัย">รักษาความปลอดภัย</option>
                                    <option value="ความปลอดภัย">ความปลอดภัย</option>
                                    <option value="วิศวกรรมและบำรุงรักษา">วิศวกรรมและบำรุงรักษา</option>
                                    <option value="พิธีการบิน">พิธีการบิน</option>
                                    <option value="บริหารงานทั่วไป">บริหารงานทั่วไป</option>
                                    <option value="Ground Service">Ground Service</option>
                                    <option value="สายการบิน">สายการบิน</option>
                                    <option value="วิทยุการบิน">วิทยุการบิน</option>
                                    <option value="อุตุนิยมวิทยา">อุตุนิยมวิทยา</option>
                                    <option value="บริษัทเอกชน">บริษัทเอกชน</option>
                                </select>
                            </div>
                            
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">ตำแหน่ง *</label>
                                <input type="text" name="position" required 
                                       class="w-full px-4 py-3 border border-gray-300 rounded-lg input-focus transition-all duration-200"
                                       placeholder="กรอกตำแหน่ง">
                            </div>
                            
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">เบอร์โทรศัพท์ *</label>
                                <input type="tel" name="phone" required 
                                       class="w-full px-4 py-3 border border-gray-300 rounded-lg input-focus transition-all duration-200"
                                       placeholder="กรอกเบอร์โทรศัพท์">
                            </div>
                        </div>
                    </div>

                    <!-- ข้อมูลติดต่อ -->
                    <div class="border-b border-gray-200 pb-6">
                        <h2 class="text-xl font-semibold text-gray-800 mb-4 flex items-center">
                            <span class="w-2 h-6 bg-blue-500 rounded mr-3"></span>
                            ข้อมูลติดต่อ
                        </h2>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">อีเมล</label>
                                <input type="email" name="email" 
                                       class="w-full px-4 py-3 border border-gray-300 rounded-lg input-focus transition-all duration-200"
                                       placeholder="กรอกอีเมล">
                            </div>
                            
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">หมายเลขพื้นที่ *</label>
                                <input type="text" name="areaNumber" required 
                                       class="w-full px-4 py-3 border border-gray-300 rounded-lg input-focus transition-all duration-200"
                                       placeholder="กรอกหมายเลขพื้นที่">
                            </div>
                        </div>
                        
                        <div class="mt-6">
                            <label class="block text-sm font-medium text-gray-700 mb-2">ที่อยู่</label>
                            <textarea name="address" rows="3" 
                                      class="w-full px-4 py-3 border border-gray-300 rounded-lg input-focus transition-all duration-200"
                                      placeholder="กรอกที่อยู่"></textarea>
                        </div>
                    </div>

                    <!-- ข้อมูลบัตร -->
                    <div class="border-b border-gray-200 pb-6">
                        <h2 class="text-xl font-semibold text-gray-800 mb-4 flex items-center">
                            <span class="w-2 h-6 bg-blue-500 rounded mr-3"></span>
                            ข้อมูลบัตร
                        </h2>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">วันที่บัตรหมดอายุ *</label>
                                <input type="date" name="expiryDate" required 
                                       class="w-full px-4 py-3 border border-gray-300 rounded-lg input-focus transition-all duration-200">
                            </div>
                            
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">ประเภทบัตร *</label>
                                <select name="cardType" required 
                                        class="w-full px-4 py-3 border border-gray-300 rounded-lg input-focus transition-all duration-200">
                                    <option value="">เลือกประเภทบัตร</option>
                                    <option value="บัตรถาวร">บัตรถาวร</option>
                                    <option value="บัตรชั่วคราว">บัตรชั่วคราว</option>
                                    <option value="Stop">Stop</option>
                                    <option value="Visitor">Visitor</option>
                                    <option value="VIP">VIP</option>
                                    <option value="VVIP">VVIP</option>
                                    <option value="Stop list">Stop list</option>
                                    <option value="ยกเลิกบัตร">ยกเลิกบัตร</option>
                                </select>
                            </div>
                            
                            <div class="md:col-span-2">
                                <label class="block text-sm font-medium text-gray-700 mb-2">หน่วยงานที่ออกบัตร *</label>
                                <input type="text" name="issuingOrganization" required 
                                       class="w-full px-4 py-3 border border-gray-300 rounded-lg input-focus transition-all duration-200"
                                       placeholder="กรอกหน่วยงานที่ออกบัตร">
                            </div>
                            
                            <div class="md:col-span-2">
                                <label class="block text-sm font-medium text-gray-700 mb-2">ข้อมูลบัตรเพิ่มเติม</label>
                                <textarea name="additionalCardInfo" rows="3" 
                                          class="w-full px-4 py-3 border border-gray-300 rounded-lg input-focus transition-all duration-200"
                                          placeholder="กรอกข้อมูลบัตรเพิ่มเติม (ถ้ามี)"></textarea>
                            </div>
                            
                            <div class="md:col-span-2">
                                <label class="block text-sm font-medium text-gray-700 mb-2">หมายเหตุ</label>
                                <textarea name="remarks" rows="3" 
                                          class="w-full px-4 py-3 border border-gray-300 rounded-lg input-focus transition-all duration-200"
                                          placeholder="กรอกหมายเหตุ (ถ้ามี)"></textarea>
                            </div>
                        </div>
                    </div>

                    <!-- อัปโหลดไฟล์ -->
                    <div class="pb-6">
                        <h2 class="text-xl font-semibold text-gray-800 mb-4 flex items-center">
                            <span class="w-2 h-6 bg-blue-500 rounded mr-3"></span>
                            อัปโหลดไฟล์
                        </h2>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">รูปภาพ (JPG, PNG) *</label>
                                <input type="file" name="image" accept=".jpg,.jpeg,.png" required 
                                       class="w-full px-4 py-3 border border-gray-300 rounded-lg input-focus transition-all duration-200"
                                       onchange="previewImage(this)">
                                <div id="imagePreview" class="mt-4"></div>
                            </div>
                            
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">ใบคำขอทำบัตรอนุญาต (PDF)</label>
                                <input type="file" name="pdf" accept=".pdf" 
                                       class="w-full px-4 py-3 border border-gray-300 rounded-lg input-focus transition-all duration-200">
                            </div>
                        </div>
                    </div>

                    <!-- ปุ่มส่งข้อมูล -->
                    <div class="pt-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <button type="submit" 
                                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 px-6 rounded-lg transition-all duration-200 transform hover:scale-105">
                                <span class="loading">
                                    <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white inline" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                    </svg>
                                    กำลังส่งข้อมูล...
                                </span>
                                <span class="submit-text">ส่งข้อมูล</span>
                            </button>
                            
                            <button type="button" id="clearBtn"
                                    class="w-full bg-gray-500 hover:bg-gray-600 text-white font-semibold py-4 px-6 rounded-lg transition-all duration-200 transform hover:scale-105">
                                ล้างข้อมูล
                            </button>
                        </div>
                    </div>
                </form>

                <!-- Success Message -->
                <div id="successMessage" class="success-message mt-6 p-4 bg-green-100 border border-green-400 text-green-700 rounded-lg">
                    <div class="flex items-center">
                        <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path>
                        </svg>
                        ส่งข้อมูลสำเร็จแล้ว!
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function previewImage(input) {
            const preview = document.getElementById('imagePreview');
            preview.innerHTML = '';
            
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.className = 'preview-image border border-gray-300';
                    preview.appendChild(img);
                    
                    const caption = document.createElement('p');
                    caption.textContent = 'ตัวอย่างรูปภาพที่อัปโหลด';
                    caption.className = 'text-sm text-gray-600 mt-2';
                    preview.appendChild(caption);
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // Clear form function
        document.getElementById('clearBtn').addEventListener('click', function() {
            Swal.fire({
                title: 'ยืนยันการล้างข้อมูล',
                text: 'คุณต้องการล้างข้อมูลทั้งหมดหรือไม่?',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#3085d6',
                cancelButtonColor: '#d33',
                confirmButtonText: 'ใช่, ล้างข้อมูล',
                cancelButtonText: 'ยกเลิก'
            }).then((result) => {
                if (result.isConfirmed) {
                    document.getElementById('cardForm').reset();
                    document.getElementById('imagePreview').innerHTML = '';
                    document.getElementById('successMessage').classList.remove('show');
                    
                    Swal.fire({
                        title: 'ล้างข้อมูลแล้ว!',
                        text: 'ข้อมูลทั้งหมดถูกล้างเรียบร้อยแล้ว',
                        icon: 'success',
                        timer: 1500,
                        showConfirmButton: false
                    });
                }
            });
        });

        document.getElementById('cardForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = e.target.querySelector('button[type="submit"]');
            const loading = submitBtn.querySelector('.loading');
            const submitText = submitBtn.querySelector('.submit-text');
            const successMessage = document.getElementById('successMessage');
            
            // Show loading state
            loading.classList.add('show');
            submitText.style.display = 'none';
            submitBtn.disabled = true;
            
            try {
                // Prepare data using URLSearchParams
                const params = new URLSearchParams();
                const form = this;
                
                // Add all form fields
                for (let element of form.elements) {
                    if (element.type !== 'file' && element.name && element.value) {
                        params.append(element.name, element.value);
                    }
                }
                
                // Handle image file - convert to base64 (using base64 as standard encoding)
                const imageFile = form.querySelector('input[name="image"]').files[0];
                if (imageFile) {
                    const imageBase64 = await fileToBase64(imageFile);
                    params.append('imageData', imageBase64);
                    params.append('imageName', imageFile.name);
                    params.append('imageType', imageFile.type);
                    params.append('imageSize', imageFile.size);
                }
                
                // Handle PDF file - convert to base64
                const pdfFile = form.querySelector('input[name="pdf"]').files[0];
                if (pdfFile) {
                    const pdfBase64 = await fileToBase64(pdfFile);
                    params.append('pdfData', pdfBase64);
                    params.append('pdfName', pdfFile.name);
                    params.append('pdfType', pdfFile.type);
                    params.append('pdfSize', pdfFile.size);
                }
                
                // Add timestamp
                params.append('timestamp', new Date().toISOString());
                
                const response = await fetch('https://script.google.com/macros/s/AKfycbzQZgsMhEbcHXgtGH8c9CbOBswh-IH9N3RlUHht7cKz50EKOM_tMvK7hmpfqcQXLpBA/exec', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: params.toString()
                });
                
                const result = await response.text();
                let jsonResult;
                
                try {
                    jsonResult = JSON.parse(result);
                } catch (parseError) {
                    console.error('Parse error:', parseError);
                    console.error('Response text:', result);
                    throw new Error('ไม่สามารถประมวลผลข้อมูลจากเซิร์ฟเวอร์ได้');
                }
                
                if (jsonResult.success) {
                    // Show success message with Sweet Alert
                    Swal.fire({
                        title: 'สำเร็จ!',
                        html: `
                            <div class="text-left">
                                <p><strong>บันทึกข้อมูลเรียบร้อยแล้ว</strong></p>
                                <p>รหัสพนักงาน: ${jsonResult.employeeId || 'N/A'}</p>
                                ${jsonResult.imageUrl ? `<p>รูปภาพ: <a href="${jsonResult.imageUrl}" target="_blank" class="text-blue-600">ดูไฟล์</a></p>` : ''}
                                ${jsonResult.pdfUrl ? `<p>PDF: <a href="${jsonResult.pdfUrl}" target="_blank" class="text-blue-600">ดูไฟล์</a></p>` : ''}
                            </div>
                        `,
                        icon: 'success',
                        confirmButtonText: 'ตกลง',
                        confirmButtonColor: '#3085d6',
                        width: '500px'
                    }).then(() => {
                        // Reset form after user clicks OK
                        this.reset();
                        document.getElementById('imagePreview').innerHTML = '';
                        successMessage.classList.remove('show');
                    });
                } else {
                    throw new Error(jsonResult.message || 'เกิดข้อผิดพลาดในการส่งข้อมูล');
                }
            } catch (error) {
                console.error('Submit error:', error);
                Swal.fire({
                    title: 'เกิดข้อผิดพลาด!',
                    text: error.message,
                    icon: 'error',
                    confirmButtonText: 'ตกลง',
                    confirmButtonColor: '#d33'
                });
            } finally {
                // Hide loading state
                loading.classList.remove('show');
                submitText.style.display = 'inline';
                submitBtn.disabled = false;
            }
        });
        
        // Function to convert file to base64
        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }
    </script>
